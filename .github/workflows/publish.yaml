name: Publish

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    if: github.event.pull_request.merged == true && github.head_ref == 'changeset-release/main'
    name: Publish
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Publish
        uses: changesets/action@v1
        id: changesets
        with:
          version: pnpm version
          publish: pnpm tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}

  deploy-website:
    needs: publish
    if: needs.publish.result == 'success' && needs.publish.outputs.publishedPackages != '' && contains(fromJson(needs.publish.outputs.publishedPackages).*.name, '@sparkium/website')
    name: Deploy website (GitHub Pages)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve website tag
        id: website-tag
        run: |
          VERSION=$(echo '${{ needs.publish.outputs.publishedPackages }}' | jq -r '.[] | select(.name=="@sparkium/website") | .version' | head -n 1)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Could not resolve @sparkium/website version from publishedPackages"
            exit 1
          fi
          echo "tag=@sparkium/website@$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.website-tag.outputs.tag }}
          fetch-depth: 0
          filter: tree:0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Nx
        run: |
          pnpm exec nx run @sparkium/website:build -- \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
